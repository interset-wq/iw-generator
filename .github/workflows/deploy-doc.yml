name: Deploy Doc Theme

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'iw.config.doc.toml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Build doc theme
        run: uv run iw build . -c iw.config.doc.toml -o _site

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
