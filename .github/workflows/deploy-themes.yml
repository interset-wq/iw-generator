name: Build and Deploy Themes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - theme: blog
            config: iw.config.blog.toml
          - theme: doc
            config: iw.config.doc.toml
          - theme: iw
            config: iw.config.iw.toml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Build ${{ matrix.theme }} theme
        run: uv run iw build . -c ${{ matrix.config }} -o _site

      - name: Deploy to ${{ matrix.theme }} branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
          publish_branch: ${{ matrix.theme }}
