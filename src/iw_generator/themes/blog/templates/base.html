<!DOCTYPE html>
<html data-color-mode="light" data-dark-theme="dark_colorblind" data-light-theme="light" lang="{{ theme.lang | default('en') }}">
<head>
    <meta content="text/html; charset=utf-8" http-equiv="content-type" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link href='https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/Primer/21.0.7/primer.css' rel='stylesheet' />
    {%- if theme.favicon -%}
    <link rel="icon" href="{{ theme.favicon }}">
{%- endif -%}
    <script>
    var IconList={{ icons | tojson }};
    {%- if theme.name in ['iw', 'blog'] %}
    let savedTheme = localStorage.getItem("meek_theme") || "light";
    document.documentElement.setAttribute("data-color-mode", savedTheme);
    let themeSettings={
        "dark": ["dark","material/brightness-4","#00f0ff","dark-blue"],
        "light": ["light","material/brightness-7","#ff5000","github-light"],
        "auto": ["auto","material/brightness-auto","","preferred-color-scheme"]
    };
    function changeTheme(mode, icon, color){
        document.documentElement.setAttribute("data-color-mode",mode);
        var themeSwitch = document.getElementById("themeSwitch");
        if(themeSwitch){
            themeSwitch.setAttribute("d",IconList[icon]);
            themeSwitch.parentNode.style.color=color;
        }
    }
    function modeSwitch(){
        let currentMode=document.documentElement.getAttribute('data-color-mode');
        let newMode = currentMode === "light" ? "dark" : currentMode === "dark" ? "auto" : "light";
        localStorage.setItem("meek_theme", newMode);
        if(themeSettings[newMode]){
            changeTheme(...themeSettings[newMode]);
        }
    }
    if(themeSettings[savedTheme]){changeTheme(...themeSettings[savedTheme]);}
    {%- endif %}
    </script>
    <style>
    html{height:100%;}
    body{box-sizing: border-box;min-width: 200px;max-width: 900px;margin: 0 auto;padding: 45px;font-size: 16px;font-family: sans-serif;line-height: 1.25;display:flex;flex-direction:column;min-height:100vh;}
    #header{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom: 1px solid var(--borderColor-muted, var(--color-border-muted));margin-bottom: 16px;}
    .header-left{display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:4px;}
    #content{flex:1 0 auto;}
    #footer{flex-shrink:0;margin-top:auto;padding-top:32px;padding-bottom:16px;}
    .code-block{position:relative;margin:16px 0;border-radius:8px;overflow:hidden;}
    .highlight-tools{display:flex;align-items:center;justify-content:flex-end;padding:8px 16px;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px;}
    .code-lang{margin-right:auto;font-size:12px;font-weight:500;opacity:.7;text-transform:uppercase;}
    .copy-button{cursor:pointer;opacity:.5;padding:4px;border-radius:4px;transition:opacity 0.2s;}
    .copy-button:hover{opacity:1;}
    .code-block .highlight{margin:0;border-radius:0;}
    .code-block pre{margin:0;padding:16px;overflow-x:auto;}
    .code-block code{font-size:13px;background:transparent;}
    [data-color-mode="light"] .code-block{background:#f6f8fa;border:1px solid #d0d7de;}
    [data-color-mode="light"] .highlight-tools{background:#f6f8fa;}
    [data-color-mode="light"] .code-lang{color:#666;}
    [data-color-mode="light"] .copy-button{color:#666;}
    [data-color-mode="dark"] .code-block{background:#161b22;border:1px solid #30363d;}
    [data-color-mode="dark"] .highlight-tools{background:#161b22;}
    [data-color-mode="dark"] .code-lang{color:#8b949e;}
    [data-color-mode="dark"] .copy-button{color:#8b949e;}
    .site-nav{display:flex;gap:16px;margin-top:48px;padding-top:24px;border-top:1px solid var(--borderColor-muted, var(--color-border-muted));}
    .site-nav__inner{display:flex;gap:16px;width:100%;}
    .site-nav__item{display:flex;align-items:center;gap:8px;padding:12px 16px;border:1px solid var(--borderColor-muted, var(--color-border-muted));border-radius:6px;text-decoration:none;color:inherit;transition:border-color 0.2s,background-color 0.2s;flex:1;min-width:0;}
    .site-nav__item:hover{border-color:var(--color-accent-fg);background-color:var(--color-canvas-subtle);}
    .site-nav__item--prev{justify-content:flex-start;}
    .site-nav__item--next{justify-content:flex-end;}
    .site-nav__info{display:flex;flex-direction:column;gap:4px;min-width:0;}
    .site-nav__info--right{text-align:right;}
    .site-nav__label{font-size:12px;color:var(--color-fg-muted);text-transform:uppercase;}
    .site-nav__title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .site-nav__arrow{color:var(--color-fg-muted);flex-shrink:0;}
    .site-footer{flex-shrink:0;margin-top:auto;padding-top:32px;padding-bottom:16px;border-top:1px solid var(--borderColor-muted, var(--color-border-muted));}
    .site-footer__inner{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--color-fg-muted);line-height:1.6;}
    .site-footer__left{display:flex;flex-direction:column;gap:4px;}
    .site-footer__left a,.site-footer__right a{color:var(--color-fg-muted);transition:color 0.2s;}
    .site-footer__left a:hover,.site-footer__right a:hover{color:var(--color-accent-fg);}
    .site-footer__right{display:flex;align-items:center;gap:16px;}
    .site-footer__right a{display:flex;align-items:center;}
    @media (max-width:600px){.site-nav__inner{flex-direction:column;gap:12px;}.site-footer__inner{flex-direction:column;gap:12px;text-align:center;}}
    </style>
    <style>
    @media (max-width:600px){
    #header{flex-direction:column;gap:8px;}
    .header-right{justify-content:center;flex-wrap:wrap;}
    }
    </style>
    {% block head %}{% endblock %}
    {% block style %}{% endblock %}
</head>
<body>
    <div id="header">{% block header %}{% endblock %}</div>
    <div id="content">{% block content %}{% endblock %}</div>
    <div id="footer">{% include 'footer.html' %}    </div>
    <script>
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.copy-button');
        if (!btn) return;
        var codeBlock = btn.closest('.code-block');
        if (!codeBlock) return;
        var code = codeBlock.querySelector('code');
        if (!code) return;
        navigator.clipboard.writeText(code.textContent).then(function() {
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
            setTimeout(function() {
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';
            }, 2000);
        });
    });
    </script>
</body>
{% block script %}{% endblock %}
</html>
