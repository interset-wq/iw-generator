{% if theme.giscus.enabled and theme.giscus.repo %}
<div id="giscus-container" style="margin-top:48px;padding-top:24px;border-top:1px solid var(--borderColor-muted, var(--color-border-muted));">
<script src="https://giscus.app/client.js"
    data-repo="{{ theme.giscus.repo }}"
    data-repo-id="{{ theme.giscus.repo_id }}"
    data-category="{{ theme.giscus.category }}"
    data-category-id="{{ theme.giscus.category_id }}"
    data-mapping="{{ theme.giscus.mapping }}"
    data-strict="0"
    data-reactions-enabled="{{ 1 if theme.giscus.reactions_enabled else 0 }}"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="{{ theme.giscus.theme }}"
    data-lang="en"
    crossorigin="anonymous"
    async>
</script>
</div>
{% endif %}
