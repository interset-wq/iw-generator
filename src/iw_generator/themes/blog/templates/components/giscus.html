{% if theme_config.theme.giscus.enabled and theme_config.theme.giscus.repo %}
<div id="giscus-container" style="margin-top:48px;padding-top:24px;border-top:1px solid var(--borderColor-muted, var(--color-border-muted));">
<script src="https://giscus.app/client.js"
    data-repo="{{ theme_config.theme.giscus.repo }}"
    data-repo-id="{{ theme_config.theme.giscus.repo_id }}"
    data-category="{{ theme_config.theme.giscus.category }}"
    data-category-id="{{ theme_config.theme.giscus.category_id }}"
    data-mapping="{{ theme_config.theme.giscus.mapping }}"
    data-strict="0"
    data-reactions-enabled="{{ 1 if theme_config.theme.giscus.reactions_enabled else 0 }}"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="{{ theme_config.theme.giscus.theme }}"
    data-lang="en"
    crossorigin="anonymous"
    async>
</script>
</div>
{% endif %}
