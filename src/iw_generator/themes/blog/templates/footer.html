<div class="footer-inner">
        <div class="footer-left">
            <div>Copyright © <span id="copyrightYear"></span> <a href="{{ site.url or '/' }}">{{ site.name }}</a></div>
            <div>Powered by <a href="https://github.com/interset-wq/iw-generator" target="_blank">iw-generator</a></div>
        </div>
        <div class="footer-right">
            <a href="/rss.xml" target="_blank" title="RSS">
                <svg class="octicon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path class="social-icon" data-icon="material/rss"></path></svg>
            </a>
            {% if theme.social.github %}
            <a href="{{ theme.social.github }}" target="_blank" title="GitHub">
                <svg class="octicon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path class="social-icon" data-icon="simple/github"></path></svg>
            </a>
            {% endif %}
            {% if theme.social.twitter %}
            <a href="{{ theme.social.twitter }}" target="_blank" title="Twitter">
                <svg class="octicon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path class="social-icon" data-icon="simple/twitter"></path></svg>
            </a>
            {% endif %}
            {% if theme.social.telegram %}
            <a href="{{ theme.social.telegram }}" target="_blank" title="Telegram">
                <svg class="octicon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path class="social-icon" data-icon="simple/telegram"></path></svg>
            </a>
            {% endif %}
            {% if theme.social.email %}
            <a href="mailto:{{ theme.social.email }}" title="Email">
                <svg class="octicon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path class="social-icon" data-icon="material/email-outline"></path></svg>
            </a>
            {% endif %}
    </div>
</div>

<script>
var now=new Date();
document.getElementById("copyrightYear").innerHTML=now.getFullYear();
document.querySelectorAll('.social-icon').forEach(function(el) {
    var icon = el.getAttribute('data-icon');
    if (IconList[icon]) el.setAttribute('d', IconList[icon]);
});
</script>
