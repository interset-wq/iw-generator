<div class="footer-inner">
        <div class="footer-left">
            <div>{% if site.copyright %}{{ site.copyright }}{% else %}Copyright © <span id="copyrightYear"></span> <a href="{{ site.url or '/' }}">{{ site.name }}</a>{% endif %}</div>
            <div>Powered by <a href="https://github.com/interset-wq/iw-generator" target="_blank">iw-generator</a></div>
        </div>
        <div class="footer-right">
            {% set social_links = social.get_all_links() %}
            {% for item in social_links %}
            <a href="{{ item.link }}" target="_blank" title="{{ item.icon.split('/')[-1] }}">
                <svg class="octicon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path class="social-icon" data-icon="{{ item.icon }}"></path></svg>
            </a>
            {% endfor %}
    </div>
</div>

<script>
var now=new Date();
var el = document.getElementById("copyrightYear");
if (el) el.innerHTML=now.getFullYear();
document.querySelectorAll('.social-icon').forEach(function(el) {
    var icon = el.getAttribute('data-icon');
    if (IconList[icon]) el.setAttribute('d', IconList[icon]);
});
</script>
