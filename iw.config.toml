[site]
name = "My Blog"
url = "https://example.com"
description = "A personal blog powered by iw-generator"

[paths]
content = "docs"
output = "site"

[theme]
name = "blog"
mode = "blog"
lang = "zh-CN"
favicon = "https://github.githubassets.com/favicons/favicon.svg"
avatar = "https://github.githubassets.com/favicons/favicon.svg"

[theme.social]
github = "https://github.com/interset-wq"
email = "intersetwq@qq.com"
enable = ["github", "email"]

[plugins]
enable = ["toc", "search", "rss"]
