# =============================================================================
# iw-generator Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Site
# -----------------------------------------------------------------------------
[site]
name = "My Blog"
url = "https://example.com"
description = "A personal blog powered by iw-generator"

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
[paths]
content = "docs"
output = "site"

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
[theme]
name = "doc"
lang = "en"
favicon = ""
avatar = ""

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
[plugins]
enable = ["toc", "highlight", "search", "rss"]
